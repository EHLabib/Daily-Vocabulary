<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📚 Vocabulary Manager</h1>

    <!-- Add Word -->
    <div class="card">
        <h2>Add New Word</h2>

        <input
            type="text"
            id="word"
            placeholder="Enter Word">

        <textarea
            id="meaning"
            placeholder="Enter Meaning"></textarea>

        <button
            class="add-btn"
            onclick="addWord()">
            Add Word
        </button>
    </div>

    <!-- Bulk Import -->
    <div class="card">

        <h2>Bulk Import</h2>

        <textarea
            id="bulkInput"
            placeholder="Paste words here...

1 Aberration বিচ্যুতি, অস্বাভাবিকতা
2 Abstruse দুর্বোধ্য
3 Acquiesce অনিচ্ছাসত্ত্বেও সম্মতি দেওয়া"></textarea>

        <button
            class="add-btn"
            onclick="bulkImport()">
            Import All Words
        </button>

    </div>

    <!-- Search -->
    <div class="card">

        <input
            type="text"
            id="search"
            placeholder="🔍 Search..."
            onkeyup="searchWords()">

    </div>

    <!-- Backup -->
    <div class="card">

        <button
            class="export-btn"
            onclick="exportJSON()">
            Export JSON
        </button>

        <input
            type="file"
            accept=".json"
            onchange="importJSON(event)">

    </div>

    <!-- Stats -->
    <div class="counter">
        Total Words:
        <span id="count">0</span>
    </div>

    <!-- Delete All -->
    <div class="card">

        <button
            class="delete-btn"
            onclick="clearAllWords()">
            Delete All Words
        </button>

    </div>

    <!-- Vocabulary List -->
    <div id="wordList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
